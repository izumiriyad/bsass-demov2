openapi: 3.0.3
info:
  title: BSL Gaming Frontend API Contracts
  version: 1.0.0
paths:
  /api/health:
    get:
      summary: Health check
      responses:
        '200': { description: OK }
  /api/readiness:
    get:
      summary: Readiness check
      responses:
        '200': { description: Ready }
  /api/odds:
    get:
      summary: Sports odds preview
      responses:
        '200': { description: Odds payload }
  /api/search:
    get:
      summary: Search games, promotions and public links
      parameters:
        - in: query
          name: q
          schema: { type: string }
      responses:
        '200': { description: Search results }
  /api/betslip/quote:
    post:
      summary: Quote possible bet slip return
      responses:
        '200': { description: Quote result }

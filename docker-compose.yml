services:
  bsl-gaming:
    build: .
    image: bsl-gaming:latest
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: https://bslgaming.com.bd
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/readiness"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
